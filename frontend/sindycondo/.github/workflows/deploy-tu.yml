name: Build & Deploy Frontend TU

on:
  push:
    branches: [develop]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Build e push da imagem Docker (tag: develop)
  # ─────────────────────────────────────────
  build:
    name: Build Image (TU)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push (tag develop)
        uses: docker/build-push-action@v5
        with:
          context: frontend/sindycondo
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop
          build-args: BUILD_CONFIG=tu
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # JOB 2: Deploy no VPS via SSH
  # ─────────────────────────────────────────
  deploy:
    name: Deploy TU
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          GITHUB_IMAGE: ${{ github.repository }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: GHCR_TOKEN,GHCR_USER,GITHUB_IMAGE,REPO,SHA
          script: |
            set -e

            cd /opt/sindycondo-tu

            echo "==> Baixando docker-compose.frontend-tu.yml..."
            RAW="https://raw.githubusercontent.com/${REPO}/${SHA}"
            rm -f docker-compose.frontend-tu.yml
            curl -sSL "${RAW}/frontend/sindycondo/docker-compose.tu.yml" -o docker-compose.frontend-tu.yml
            test -s docker-compose.frontend-tu.yml || { echo "ERRO: docker-compose.frontend-tu.yml vazio"; exit 1; }

            echo "==> Autenticando no GHCR..."
            echo "$GHCR_TOKEN" | docker login ghcr.io \
              -u "$GHCR_USER" --password-stdin

            echo "==> Baixando nova imagem (develop)..."
            GITHUB_IMAGE=$GITHUB_IMAGE docker compose -f docker-compose.frontend-tu.yml pull frontend

            echo "==> Subindo container TU..."
            GITHUB_IMAGE=$GITHUB_IMAGE docker compose -f docker-compose.frontend-tu.yml up -d --no-deps frontend

            echo "==> Aguardando frontend iniciar..."
            sleep 5
            docker compose -f docker-compose.frontend-tu.yml ps

            echo "==> Limpando imagens antigas..."
            docker image prune -f

            echo "==> Deploy TU do frontend concluído com sucesso!"
